<!--
  비밀번호 재설정 메일 본문. Supabase 대시보드(Authentication → Emails → Reset Password)에 넣는 내용이고,
  이 파일은 그 사본이다 — 대시보드에만 있으면 무엇을 왜 그렇게 썼는지 저장소에서 알 수 없다.
  제목: [널스넷] 비밀번호 재설정

  {{ .RedirectTo }} 는 resetPasswordForEmail 에 넘긴 주소(= <사이트>/auth/confirm)로 치환된다.
  {{ .ConfirmationURL }}(기본값)을 쓰지 않는 이유: 그 링크는 PKCE라 재설정을 요청한 바로 그 브라우저에서만
  열린다. 메일을 폰에서 열면 실패하는데 화면에는 "링크 만료"라고만 떠서 사용자가 무한 재요청을 하게 된다.
  token_hash 는 서버에서 검증하므로 어느 기기에서 열어도 동작한다.
-->
<h2>비밀번호 재설정</h2>
<p>널스넷 비밀번호를 다시 정하려면 아래 링크를 눌러 주세요.</p>
<p><a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=recovery">새 비밀번호 정하기</a></p>
<p>이 링크는 1시간 동안만 쓸 수 있고, 한 번 사용하면 만료됩니다.</p>
<p>본인이 요청한 것이 아니라면 이 메일은 무시하셔도 됩니다. 비밀번호는 그대로 유지됩니다.</p>
